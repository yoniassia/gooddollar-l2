name: Deploy to Devnet

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy contracts + restart services
    runs-on: ubuntu-latest
    environment: devnet
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: goodclaw
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/goodclaw/gooddollar-l2
            git pull origin main
            forge script script/Deploy.s.sol --rpc-url http://localhost:8545 --broadcast --private-key $DEVNET_DEPLOYER_KEY || true
            pm2 restart goodswap 2>/dev/null || true
            echo "Deploy complete"

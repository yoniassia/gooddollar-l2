name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast checks first (fail fast) ──────────────────────────────
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Frontend — Install & Typecheck
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit

      - name: SDK — Install & Typecheck
        working-directory: sdk
        run: |
          npm ci
          npx tsc --noEmit

  # ── Solidity ────────────────────────────────────────────────────
  contracts:
    name: Solidity (Forge)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Cache Forge
        uses: actions/cache@v4
        with:
          path: |
            cache
            out
          key: forge-${{ hashFiles('foundry.toml', 'src/**/*.sol', 'lib/**') }}
          restore-keys: forge-

      - name: Build contracts
        run: forge build --sizes

      - name: Run tests
        run: forge test -vvv
        env:
          FOUNDRY_PROFILE: ci

      - name: Gas report
        run: forge test --gas-report > gas-report.txt 2>&1 || true

      - name: Coverage
        run: forge coverage --ir-minimum --report summary --report lcov
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-coverage
          path: lcov.info
          retention-days: 14

      - name: Upload gas report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: gas-report.txt
          retention-days: 14

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test (Vitest)
        run: npx vitest run --reporter=verbose 2>/dev/null || echo "No vitest tests yet"
        continue-on-error: true

  # ── SDK ─────────────────────────────────────────────────────────
  sdk:
    name: SDK Build & Test
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test 2>/dev/null || echo "No tests configured yet"
        continue-on-error: true

  # ── Security (optional, non-blocking) ──────────────────────────
  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build for analysis
        run: forge build

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          sarif: slither-results.sarif
          fail-on: none
        continue-on-error: true

      - name: Upload Slither SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: slither-results.sarif
        continue-on-error: true

name: Manual Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    name: Bump Version (${{ inputs.bump_type }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump root version
        run: |
          npm version ${{ inputs.bump_type }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Bump frontend version
        working-directory: frontend
        run: npm version ${{ inputs.bump_type }} --no-git-tag-version

      - name: Bump SDK version
        working-directory: sdk
        run: npm version ${{ inputs.bump_type }} --no-git-tag-version

      - name: Update manifest
        run: |
          echo "{" > .release-please-manifest.json
          echo "  \".\": \"$NEW_VERSION\"," >> .release-please-manifest.json
          echo "  \"frontend\": \"$NEW_VERSION\"," >> .release-please-manifest.json
          echo "  \"sdk\": \"$NEW_VERSION\"" >> .release-please-manifest.json
          echo "}" >> .release-please-manifest.json

      - name: Commit and tag
        run: |
          git add -A
          git commit -m "chore(release): v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main --tags

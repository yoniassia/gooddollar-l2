[profile.default]
src = "src"
out = "out"
libs = ["lib"]

via_ir = true
optimizer = true
optimizer_runs = 200

# Coverage: forge coverage forces viaIR=false which causes stack-too-deep in contracts
# that rely on it. Use the --ir-minimum flag when running coverage:
#   forge coverage --ir-minimum --report summary
# ir_minimum is a CLI-only flag and cannot be set in foundry.toml.

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
